<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: fit-content;
    }

    body {
        font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
        background: linear-gradient(135deg, #f0f2f5 0%, #e6e9ef 100%);
        padding: 32px;
    }

    .card {
        width: 700px;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .hero {
        position: relative;
        width: 100%;
        height: 300px;
        overflow: hidden;
        background: #d70c19;
    }

    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%);
    }

    .brand {
        position: absolute;
        top: 18px;
        left: 20px;
        display: inline-flex;
        align-items: center;
        background: #d70c19;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        padding: 6px 14px;
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(215, 12, 25, 0.4);
        letter-spacing: 1px;
    }

    .content {
        padding: 28px 34px 30px 34px;
    }

    .title {
        font-size: 27px;
        font-weight: 800;
        color: #1a1a1a;
        line-height: 1.4;
        margin-bottom: 16px;
    }

    .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        font-size: 14px;
        color: #8a8f99;
        margin-bottom: 20px;
    }

    .divider {
        height: 1px;
        background: linear-gradient(to right, #d70c19, #f0f2f5);
        margin-bottom: 22px;
    }

    .body {
        font-size: 16.5px;
        line-height: 1.85;
        color: #3a3f47;
        white-space: pre-wrap;
        word-break: break-word;
        margin-bottom: 26px;
    }

    .summary {
        background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
        border-radius: 12px;
        padding: 18px 20px;
    }

    .summary-label {
        font-size: 15px;
        font-weight: 700;
        color: #d70c19;
        margin-bottom: 8px;
    }

    .summary-text {
        font-size: 16px;
        line-height: 1.6;
        color: #4a2f31;
    }

    .footer {
        text-align: center;
        font-size: 12px;
        color: #b0b4bc;
        padding: 14px;
        background: #fafbfc;
    }
</style>
</head>
<body>
    <div class="card">
        <div class="hero">
            {% if header_image %}
            <img src="{{ header_image }}" alt="header">
            {% endif %}
            <div class="hero-overlay"></div>
            <div class="brand">IT之家</div>
        </div>
        <div class="content">
            <div class="title">{{ title }}</div>
            <div class="meta">
                {% if post_date %}<span>{{ post_date }}</span>{% endif %}
                {% if source %}<span>来源：{{ source }}</span>{% endif %}
            </div>
            <div class="divider"></div>
            <div class="body">{{ body }}</div>
            <div class="summary">
                <div class="summary-label">AI 总结</div>
                <div class="summary-text">{{ ai_summary }}</div>
            </div>
        </div>
        <div class="footer">由 astrbot_plugin_ithome_summary 生成 · 数据来源 IT之家</div>
    </div>
</body>
</html>
